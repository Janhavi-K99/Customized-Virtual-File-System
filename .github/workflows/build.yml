name: Build CVFS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  # ─── Linux build (original) ─────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        qt_version: [6.6]
        qt_arch: [gcc_64]

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        arch: ${{ matrix.qt_arch }}
        cache: true

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
        -G "Unix Makefiles"

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

    - name: Upload GUI executable
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_gui-Linux
        path: ${{ github.workspace }}/build/cvfs_gui
        if-no-files-found: warn

    - name: Upload CLI executable
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_cli-Linux
        path: ${{ github.workspace }}/build/cvfs_cli
        if-no-files-found: warn

    - name: Upload original executable
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_original-Linux
        path: ${{ github.workspace }}/build/cvfs_original
        if-no-files-found: warn

  # ─── Windows release job (GUI + installer) ─────────────────
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6'
        arch: win64_msvc2019_64

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Create dist folder
      run: |
        mkdir ${{ github.workspace }}\dist
        copy ${{ github.workspace }}\build\${{ env.BUILD_TYPE }}\cvfs_gui.exe ${{ github.workspace }}\dist\

    - name: Run windeployqt
      run: windeployqt ${{ github.workspace }}\dist\cvfs_gui.exe --release

    - name: Copy CLI and original (optional)
      run: |
        copy ${{ github.workspace }}\build\${{ env.BUILD_TYPE }}\cvfs_cli.exe ${{ github.workspace }}\dist\ 2>$null
        copy ${{ github.workspace }}\build\${{ env.BUILD_TYPE }}\cvfs_original.exe ${{ github.workspace }}\dist\ 2>$null

    - name: Install Inno Setup
      run: choco install innosetup --no-progress --confirm

    - name: Build installer
      run: ISCC ${{ github.workspace }}\installer\CVFS_Setup.iss

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: CVFS_Setup-Windows
        path: ${{ github.workspace }}\installer\CVFS_Setup.exe
        if-no-files-found: error

    - name: Upload GUI executable (Windows)
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_gui-Windows
        path: ${{ github.workspace }}\build\${{ env.BUILD_TYPE }}\cvfs_gui.exe
        if-no-files-found: warn

    - name: Upload CLI executable (Windows)
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_cli-Windows
        path: ${{ github.workspace }}\build\${{ env.BUILD_TYPE }}\cvfs_cli.exe
        if-no-files-found: warn

    - name: Upload original executable (Windows)
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_original-Windows
        path: ${{ github.workspace }}\build\${{ env.BUILD_TYPE }}\cvfs_original.exe
        if-no-files-found: warn
