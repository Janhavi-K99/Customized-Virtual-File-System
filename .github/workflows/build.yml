name: Build CVFS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        qt_version: [6.6]
        qt_arch: [gcc_64]

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        arch: ${{ matrix.qt_arch }}
        modules: qtbase
        cache: true

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
        -G "Unix Makefiles"

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

    - name: Upload GUI executable
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_gui-${{ runner.os }}
        path: ${{ github.workspace }}/build/cvfs_gui
        if-no-files-found: warn

    - name: Upload CLI executable
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_cli-${{ runner.os }}
        path: ${{ github.workspace }}/build/cvfs_cli
        if-no-files-found: warn

    - name: Upload original executable
      uses: actions/upload-artifact@v4
      with:
        name: cvfs_original-${{ runner.os }}
        path: ${{ github.workspace }}/build/cvfs_original
        if-no-files-found: warn
